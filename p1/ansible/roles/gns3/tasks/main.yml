- name: Update apt cache
  apt:
    update_cache: yes
  become: yes

# =========================
# UBUNTU BLOCK
# =========================
- block:

    - name: Add GNS3 PPA
      apt_repository:
        repo: ppa:gns3/ppa
        state: present
        update_cache: yes
      become: yes

    - name: Install GNS3 on Ubuntu
      apt:
        name:
          - gns3-gui
          - gns3-server
          - ubridge
          - python3-pyqt5
          - python3-pip
          - wireshark
        state: present
        update_cache: yes
      become: yes

  when: ansible_facts['distribution'] == "Ubuntu"

# =========================
# DEBIAN BLOCK
# =========================
- block:
    - name: Install Python3, pip et pipx
      apt:
        name:
          - python3
          - python3-pip
          - pipx
        state: present
        update_cache: yes
      become: yes

    - name: Ensure pipx bin path is in system PATH
      lineinfile:
        path: /etc/environment
        regexp: 'PATH='
        line: 'PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/root/.local/bin"'
        state: present
      become: yes

    - name: Install GNS3 server via pipx
      command: pipx install gns3-server
      become: yes
      environment:
        PIPX_HOME: /opt/pipx
        PIPX_BIN_DIR: /usr/local/bin

    - name: Install GNS3 GUI via pipx
      command: pipx install gns3-gui
      become: yes
      environment:
        PIPX_HOME: /opt/pipx
        PIPX_BIN_DIR: /usr/local/bin

    - name: Inject PyQt6 et gns3-server dans l'env GUI
      command: pipx inject gns3-gui PyQt6 gns3-server
      become: yes
      environment:
        PIPX_HOME: /opt/pipx
        PIPX_BIN_DIR: /usr/local/bin

  when: ansible_facts['distribution'] == "Debian"


- name: Clean apt cache
  apt:
    autoclean: yes
    autoremove: yes
  become: yes